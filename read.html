<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读小说</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script> tailwind.config = { darkMode: 'class' } </script>
    <style> .dark{color-scheme:dark;} .read{line-height:2.2; text-indent:2em;} </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-white transition-colors">
    <header class="fixed w-full bg-white dark:bg-gray-800 shadow p-4 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2"><i class="fa fa-arrow-left"></i> 返回</a>
            <h1 class="font-bold" id="bookname"></h1>
            <button id="darkToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700"><i class="fa fa-moon-o dark:hidden"></i><i class="fa fa-sun-o hidden dark:inline"></i></button>
        </div>
    </header>
    <main class="pt-24 pb-16 max-w-3xl mx-auto px-4">
        <div class="mb-6 flex flex-wrap gap-2" id="chaplist"></div>
        <div class="bg-white dark:bg-gray-800 p-6 rounded shadow">
            <h2 class="text-xl font-bold text-center mb-4" id="chaptitle"></h2>
            <div class="read text-gray-700 dark:text-gray-300 whitespace-pre-line" id="content"></div>
        </div>
        <div class="flex justify-between mt-6">
            <button id="prev" class="px-4 py-2 border rounded">上一章</button>
            <button id="next" class="px-4 py-2 border rounded">下一章</button>
        </div>
    </main>
    <script>
        if(localStorage.getItem('dark')==='1') document.documentElement.classList.add('dark');
        document.getElementById('darkToggle').onclick=()=>{
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark',document.documentElement.classList.contains('dark')?'1':'0');
        };

        let data = JSON.parse(localStorage.getItem("ALL_DATA"));
        let idx = localStorage.getItem("read_idx");
        let book = data.novels[idx];
        let c = 0;

        document.getElementById("bookname").innerText=book.title;

        function render(){
            let h=""; book.chapters.forEach((chap,i)=>{
                h+=`<button onclick="go(${i})" class="px-3 py-1 border rounded ${i==c?'bg-black text-white dark:bg-white dark:text-black':''}">${chap.title}</button>`;
            });
            document.getElementById("chaplist").innerHTML=h;
            document.getElementById("chaptitle").innerText=book.chapters[c].title;
            document.getElementById("content").innerText=book.chapters[c].content;
        }

        function go(i){c=i;render();}
        document.getElementById("prev").onclick=()=>{if(c>0)go(c-1);}
        document.getElementById("next").onclick=()=>{if(c<book.chapters.length-1)go(c+1);}
        render();
    </script>
</body>
</html>
