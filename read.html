<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说阅读</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>tailwind.config={darkMode:'class'}</script>
    <style>
        .dark{color-scheme:dark;}
        .read-content{line-height:2.2; text-indent:2em;}
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 font-sans transition-colors duration-300">
    <header class="fixed w-full bg-white dark:bg-gray-800 shadow-sm py-4 px-6 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <i class="fa fa-arrow-left"></i> 返回首页
            </a>
            <h1 class="text-lg font-bold" id="bookName"></h1>
            <button id="darkToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700">
                <i class="fa fa-moon-o dark:hidden"></i>
                <i class="fa fa-sun-o hidden dark:inline"></i>
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 pt-28 pb-20">
        <!-- 章节目录 -->
        <div class="mb-10">
            <h3 class="font-bold text-lg mb-4">章节目录</h3>
            <div class="flex flex-wrap gap-2" id="chapBtnBox"></div>
        </div>

        <!-- 阅读内容 -->
        <div class="bg-white dark:bg-gray-800 p-6 md:p-10 rounded-lg shadow-sm">
            <h2 class="text-xl font-bold mb-6 text-center" id="chapName"></h2>
            <div class="read-content text-gray-700 dark:text-gray-300 whitespace-pre-wrap" id="chapText"></div>
        </div>

        <!-- 上下章切换 -->
        <div class="flex justify-between mt-8">
            <button id="prevChap" class="px-6 py-2 border dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-800">上一章</button>
            <button id="nextChap" class="px-6 py-2 border dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-800">下一章</button>
        </div>
    </main>

    <script>
        // 暗黑模式同步
        const darkToggle = document.getElementById('darkToggle');
        if(localStorage.getItem('dark') === '1' || 
           (!localStorage.getItem('dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)){
            document.documentElement.classList.add('dark');
        }
        darkToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark', document.documentElement.classList.contains('dark') ? '1' : '0');
        };

        // 获取当前小说
        let novelIdx = localStorage.getItem("readNovelIndex") || 0;
        let data = JSON.parse(localStorage.getItem("novelBlogData"));
        let novel = data.novels[novelIdx];
        let currChap = 0;

        document.getElementById("bookName").innerText = novel.title;

        // 渲染章节按钮
        function renderChapBtn(){
            let html = "";
            novel.chapters.forEach((item, idx)=>{
                html += `<button onclick="switchChap(${idx})" 
                class="px-3 py-1 rounded border dark:border-gray-600 text-sm ${idx===currChap?'bg-black text-white dark:bg-white dark:text-black':''}">
                    ${item.title}
                </button>`;
            });
            document.getElementById("chapBtnBox").innerHTML = html;
        }

        // 切换章节
        function switchChap(idx){
            currChap = idx;
            let chap = novel.chapters[idx];
            document.getElementById("chapName").innerText = chap.title;
            document.getElementById("chapText").innerText = chap.content;
            renderChapBtn();
        }

        // 上下章
        document.getElementById("prevChap").onclick = ()=>{
            if(currChap > 0) switchChap(currChap - 1);
        };
        document.getElementById("nextChap").onclick = ()=>{
            if(currChap < novel.chapters.length - 1) switchChap(currChap + 1);
        };

        // 初始化
        switchChap(0);
    </script>
</body>
</html>
