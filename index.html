<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人小说播客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Menlo", "Monaco", Consolas, monospace;
        }

        body {
            background: url("https://img0.baidu.com/it/u=3316744029,1670173871&fm=253&fmt=auto&app=138&f=JPEG?w=1920&h=1080") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            /* ✅ 严格1:2布局，整体居中，不再偏左 */
            display: grid;
            grid-template-columns: 1fr 2fr;
            align-items: center;
            justify-items: center;
            gap: 30px;
            padding: 20px;
            padding-bottom: 80px; /* 给底部版权留固定空间 */
        }

        /* -------------------------- 左栏：1份 个人窗口（垂直居中） -------------------------- */
        .left-window {
            width: 280px;
            height: 420px;
            background: rgba(255, 255, 255, 0.72);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* -------------------------- 右栏：2份 放大堆叠窗口（整体上移） -------------------------- */
        .right-stack {
            position: relative;
            width: 550px; /* ✅ 窗口放大 */
            height: 400px; /* ✅ 窗口放大 */
            margin-top: -40px; /* ✅ 整体向上偏移1/2，往上移 */
        }

        .window-back {
            position: absolute;
            top: -40px;
            left: -40px;
            width: 550px;
            height: 400px;
            background: rgba(255, 255, 255, 0.65);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .window-front {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 550px;
            height: 400px;
            background: rgba(255, 255, 255, 0.75);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* -------------------------- 窗口通用样式 -------------------------- */
        .window-header {
            background: rgba(245, 245, 245, 0.8);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
