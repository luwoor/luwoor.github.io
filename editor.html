<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级后台 - 小说博客管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script> tailwind.config = { darkMode: 'class' } </script>
    <style> .dark{color-scheme:dark;} </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-white transition-colors duration-300">
    <header class="fixed w-full bg-white dark:bg-gray-800 shadow z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">📝 小说博客超级后台</h1>
            <div class="flex gap-3 items-center">
                <button id="darkToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700"><i class="fa fa-moon-o dark:hidden"></i><i class="fa fa-sun-o hidden dark:inline"></i></button>
                <a href="index.html" class="px-3 py-1 border rounded">预览首页</a>
                <button onclick="saveAll()" class="bg-black dark:bg-white dark:text-black text-white px-4 py-1 rounded">💾 保存全部</button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-20 container mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 左边：网站基础设置 -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded shadow space-y-4">
                <h2 class="font-bold text-lg border-b pb-2">🌐 网站基础设置</h2>
                <input id="site_title" class="w-full border p-2 rounded" placeholder="网站名称">
                <input id="hero_title" class="w-full border p-2 rounded" placeholder="首页大标题">
                <textarea id="hero_desc" class="w-full border p-2 rounded" rows="2" placeholder="首页描述"></textarea>
                <input id="featured_title" class="w-full border p-2 rounded" placeholder="精选小说标题">
                <input id="writing_title" class="w-full border p-2 rounded" placeholder="写作干货标题">
            </div>

            <!-- 右边：订阅区域 -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded shadow space-y-4">
                <h2 class="font-bold text-lg border-b pb-2">📩 订阅区域设置</h2>
                <input id="sub_title" class="w-full border p-2 rounded" placeholder="订阅标题">
                <textarea id="sub_desc" class="w-full border p-2 rounded" rows="2" placeholder="订阅描述"></textarea>
                <input id="sub_tip" class="w-full border p-2 rounded" placeholder="订阅底部提示">
            </div>

            <!-- 写作干货 -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded shadow space-y-4">
                <h2 class="font-bold text-lg border-b pb-2">✍️ 写作干货设置</h2>
                <input id="writing_item_title" class="w-full border p-2 rounded" placeholder="干货标题">
                <div class="grid grid-cols-2 gap-3">
                    <input id="writing_item_type" class="border p-2 rounded" placeholder="分类">
                    <input id="writing_item_date" class="border p-2 rounded" placeholder="日期">
                </div>
                <textarea id="writing_item_desc" class="w-full border p-2 rounded" rows="3" placeholder="干货内容"></textarea>
            </div>

            <!-- 页脚 -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded shadow space-y-4">
                <h2 class="font-bold text-lg border-b pb-2">🧾 页脚设置</h2>
                <input id="footer_about_title" class="w-full border p-2 rounded" placeholder="关于标题">
                <textarea id="footer_about_text" class="w-full border p-2 rounded" rows="2" placeholder="关于内容"></textarea>
                <input id="footer_nav_title" class="w-full border p-2 rounded" placeholder="导航标题">
                <input id="footer_cat_title" class="w-full border p-2 rounded" placeholder="分类标题">
                <input id="footer_contact_title" class="w-full border p-2 rounded" placeholder="联系标题">
                <input id="footer_contact_text" class="w-full border p-2 rounded" placeholder="联系内容">
                <input id="footer_copyright" class="w-full border p-2 rounded" placeholder="版权信息">
            </div>
        </div>

        <!-- 小说管理（超级功能） -->
        <div class="mt-6 bg-white dark:bg-gray-800 p-6 rounded shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg">📚 小说管理（写小说）</h2>
                <button onclick="addNovel()" class="px-3 py-1 border rounded">+ 添加小说</button>
            </div>
            <div id="novels_admin" class="space-y-6"></div>
        </div>
    </main>

    <script>
        const darkToggle = document.getElementById('darkToggle');
        if(localStorage.getItem('dark')==='1') document.documentElement.classList.add('dark');
        darkToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark', document.documentElement.classList.contains('dark')?'1':'0');
        };

        const defaultData = {
            site_title:"小说博客",hero_title:"探索文学的无限可能",hero_desc:"发现最新小说、经典名著和写作干货，开启你的创作与阅读之旅",
            featured_title:"精选小说",writing_title:"写作干货",
            novels:[{title:"新小说",type:"类型",author:"作者",desc:"简介",cover:"",chapters:[{title:"第一章",content:"开始写正文"}]}]
        };

        let data = JSON.parse(localStorage.getItem("ALL_DATA") || JSON.stringify(defaultData));

        function renderForm(){
            document.getElementById("site_title").value = data.site_title;
            document.getElementById("hero_title").value = data.hero_title;
            document.getElementById("hero_desc").value = data.hero_desc;
            document.getElementById("featured_title").value = data.featured_title;
            document.getElementById("writing_title").value = data.writing_title;
            document.getElementById("sub_title").value = data.sub_title;
            document.getElementById("sub_desc").value = data.sub_desc;
            document.getElementById("sub_tip").value = data.sub_tip;
            document.getElementById("writing_item_title").value = data.writing_item_title;
            document.getElementById("writing_item_type").value = data.writing_item_type;
            document.getElementById("writing_item_date").value = data.writing_item_date;
            document.getElementById("writing_item_desc").value = data.writing_item_desc;
            document.getElementById("footer_about_title").value = data.footer_about_title;
            document.getElementById("footer_about_text").value = data.footer_about_text;
            document.getElementById("footer_nav_title").value = data.footer_nav_title;
            document.getElementById("footer_cat_title").value = data.footer_cat_title;
            document.getElementById("footer_contact_title").value = data.footer_contact_title;
            document.getElementById("footer_contact_text").value = data.footer_contact_text;
            document.getElementById("footer_copyright").value = data.footer_copyright;
            renderNovels();
        }

        function renderNovels(){
            let h = "";
            data.novels.forEach((n,ni)=>{
                h+=`
                <div class="border p-4 rounded dark:border-gray-700">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
                        <input value="${n.title}" oninput="data.novels[${ni}].title=this.value" class="border p-2 rounded" placeholder="书名">
                        <input value="${n.type}" oninput="data.novels[${ni}].type=this.value" class="border p-2 rounded" placeholder="分类">
                        <input value="${n.author}" oninput="data.novels[${ni}].author=this.value" class="border p-2 rounded" placeholder="作者">
                        <input type="file" accept="image/*" onchange="upCover(event,${ni})" class="text-sm">
                    </div>
                    <textarea value="${n.desc}" oninput="data.novels[${ni}].desc=this.value" class="w-full border p-2 rounded mb-3" rows="2" placeholder="简介">${n.desc}</textarea>
                    <img src="${n.cover}" class="h-24 object-cover rounded ${n.cover?'':'hidden'} mb-3">
                    <div class="border-t pt-3">
                        <button onclick="addChap(${ni})" class="text-blue-500 text-sm">+ 添加章节</button>
                        <div class="mt-3 space-y-2">${renderChaps(ni)}</div>
                    </div>
                    <button onclick="delNovel(${ni})" class="text-red-500 text-sm mt-2">删除这本小说</button>
                </div>`;
            });
            document.getElementById("novels_admin").innerHTML=h;
        }

        function renderChaps(ni){
            let h="";
            data.novels[ni].chapters.forEach((c,ci)=>{
                h+=`
                <div class="border p-2 rounded dark:border-gray-700">
                    <input value="${c.title}" oninput="data.novels[${ni}].chapters[${ci}].title=this.value" class="w-full border p-1 rounded mb-1" placeholder="章节名">
                    <textarea oninput="data.novels[${ni}].chapters[${ci}].content=this.value" class="w-full border p-2 rounded" rows="4" placeholder="正文">${c.content}</textarea>
                    <button onclick="delChap(${ni},${ci})" class="text-xs text-red-500">删除章节</button>
                </div>`;
            });
            return h;
        }

        function upCover(e,ni){
            let f = e.target.files[0]; if(!f)return;
            let r=new FileReader(); r.onload=(e)=>{ data.novels[ni].cover=e.target.result; renderNovels(); }
            r.readAsDataURL(f);
        }

        function addNovel(){ data.novels.push({title:"新小说",type:"",author:"",desc:"",cover:"",chapters:[{title:"第一章",content:""}]}); renderNovels(); }
        function delNovel(ni){ data.novels.splice(ni,1); renderNovels(); }
        function addChap(ni){ data.novels[ni].chapters.push({title:"新章节",content:""}); renderNovels(); }
        function delChap(ni,ci){ data.novels[ni].chapters.splice(ci,1); renderNovels(); }

        function saveAll(){
            data.site_title = document.getElementById("site_title").value;
            data.hero_title = document.getElementById("hero_title").value;
            data.hero_desc = document.getElementById("hero_desc").value;
            data.featured_title = document.getElementById("featured_title").value;
            data.writing_title = document.getElementById("writing_title").value;
            data.sub_title = document.getElementById("sub_title").value;
            data.sub_desc = document.getElementById("sub_desc").value;
            data.sub_tip = document.getElementById("sub_tip").value;
            data.writing_item_title = document.getElementById("writing_item_title").value;
            data.writing_item_type = document.getElementById("writing_item_type").value;
            data.writing_item_date = document.getElementById("writing_item_date").value;
            data.writing_item_desc = document.getElementById("writing_item_desc").value;
            data.footer_about_title = document.getElementById("footer_about_title").value;
            data.footer_about_text = document.getElementById("footer_about_text").value;
            data.footer_nav_title = document.getElementById("footer_nav_title").value;
            data.footer_cat_title = document.getElementById("footer_cat_title").value;
            data.footer_contact_title = document.getElementById("footer_contact_title").value;
            data.footer_contact_text = document.getElementById("footer_contact_text").value;
            data.footer_copyright = document.getElementById("footer_copyright").value;
            localStorage.setItem("ALL_DATA", JSON.stringify(data));
            alert("✅ 保存成功！所有内容已更新！");
        }

        renderForm();
    </script>
</body>
</html>
